### Skills [ skills ]
skills:
  title: "Skills"
  subtitle: "my <b>Skills</b>"
  bg_title: "Skills"

  column1:
    items:
      - label: "linux iptables" #0-10 progress in dots
        text: "기본 정책 설정, 패킷 필터링, 포트 포워딩, NAT 설정, 로깅 설정, 헤더 정보 변경 등을 룰 충돌없이 의도대로 수행 가능합니다"
        value: "85" #0-100 progress in %

      - label: "Wireshark" #0-10 progress in dots
        text: "와이어샤크를 사용하여 패킷을 캡쳐하고 필터링 및 분석할 수 있습니다. 패킷 필터링, 프로토콜 분석, 트래픽 통계, 복호화 등 유연성 있게 사용 가능합니다"
        value: "80" #0-100 progress in %

  column2:
    items:
      - label: "C" #0-10 progress in dots
        text: "C로 작성된 코드를 어렵지 않게 이해 및 분석 가능합니다"
        value: "85" #0-100 progress in %

      - label: "Python" #0-10 progress in dots
        text: "Python으로 필요한 스크립트를 작성할 수 있으며, 다양한 라이브러리를 활용하여 프로그램을 개발할 수 있습니다"
        value: "80" #0-100 progress in %

  column3:
    items:
      - label: "Docker" #0-10 progress in dots
        text: "Docker를 터미널에서 사용하여 컨테이너를 만들고 관리할 수 있습니다. Dockerfile을 작성하고, 이미지 빌드 및 배포가 가능합니다"
        value: "70" #0-100 progress in %

      - label: "VMWare" #0-10 progress in dots
        text: "VMWare Workstation을 사용하여 가상환경을 원하는대로 디테일하게 구축 가능합니다. 또한 VMware Workstation으로 MAC OS를 설치할 수 있습니다"
        value: "85" #0-100 progress in %


