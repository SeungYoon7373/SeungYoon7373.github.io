### Resume [ resume ]
resume:
  title: "Resume"
  subtitle: "학력 및 경력"
  bg_title: "History"

  education:
    title: "Education"
    items:
      - name: "Korea Polytechnics"
        subname: "Dept. of CyberSecurity"
        period: "2023 - <b>Present</b>"
        text: "한국폴리텍대학 사이버보안과에 재학 중 컴퓨터공학 기초부터 사이버보안 장비 및 솔루션에 이르기까지 배웠습니다"

      - name: "KISA"
        subname: "K-Shield jr."
        period: "2025 - 2025"
        text: "KISA에서 운영하는 K-Shield jr. 기초과정에 참여하였습니다"

      - name: "KISIA"
        subname: "ICT 융합 산업보안 인력양성사업"
        period: "2025 - 2025"
        text: "KISIA에서 실행하는 클라우드 보안 관련 교육을 들을 예정입니다"

  experience:
    title: "Experience"
    items:
      - name: "Project Leader"
        subname: "RealTime Voice Encryption Transfer System"
        period: "2025 - <b>Present</b>"
        text: "실시간 음성 암호화통신 시스템을 개발하는데 음성 처리, 코덱 인디코딩, 네트워크 구축 등을 수행하였습니다"


